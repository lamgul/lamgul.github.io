<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — 길을 잃었네요</title>
<meta name="robots" content="noindex">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="/assets/css/base.css">
<script>
  (function(){try{var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;else document.documentElement.removeAttribute("data-theme");}catch(e){}})();
</script>
<style>
  .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: var(--sp-4); }
  .nf .code { font-family: var(--serif); font-size: clamp(5rem, 14vw, 12rem); font-weight: 300; line-height: 1; letter-spacing: -0.03em; }
  .nf .code b { color: var(--accent); font-style: italic; font-weight: 400; }
  .nf p { color: var(--ink-2); font-size: var(--t-1); margin: var(--sp-3) 0 var(--sp-5); max-width: 42ch; }
  .nf .home { display: inline-flex; gap: 0.5em; align-items: center; background: var(--ink); color: var(--bg); padding: 0.85em 1.5em; border-radius: 100px; font-weight: 500; transition: transform .25s var(--ease-out); }
  .nf .home:hover { transform: translateY(-2px); }
  .nf .mono { font-family: var(--mono); font-size: var(--t--1); color: var(--ink-3); margin-top: var(--sp-5); }
</style>
</head>
<body>
<main class="nf">
  <div>
    <div class="code">4<b>0</b>4</div>
    <p>이 주소엔 아무 철길도 놓여 있지 않네요. 주소를 잘못 짚었거나, 제가 아직 안 만든 길입니다.</p>
    <a class="home" href="/">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg>
      홈으로 돌아가기
    </a>
    <div class="mono">ann. — 풀스택 개발자</div>
  </div>
</main>
<script src="assets/js/critters.js" defer></script>
<script src="assets/js/quicknav.js" defer></script>
</body>
</html>
