<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Mumyeong series cover">
  <rect width="400" height="300" fill="#161410"/>
  <!-- rain -->
  <g stroke="#3a342a" stroke-width="1.6" stroke-linecap="round">
    <path d="M42 18 l-6 26"/><path d="M96 8 l-6 26"/><path d="M150 24 l-6 26"/>
    <path d="M210 6 l-6 26"/><path d="M268 20 l-6 26"/><path d="M330 10 l-6 26"/>
    <path d="M372 30 l-6 26"/><path d="M66 62 l-6 26"/><path d="M296 66 l-6 26"/>
    <path d="M356 84 l-6 26"/><path d="M24 96 l-6 26"/><path d="M182 60 l-6 26"/>
  </g>
  <!-- blank id tag on a red thread -->
  <path d="M200 34 v30" stroke="#db4322" stroke-width="2" fill="none"/>
  <circle cx="200" cy="34" r="4" fill="none" stroke="#db4322" stroke-width="2"/>
  <g>
    <rect x="142" y="64" width="116" height="150" rx="10" fill="#1b1915" stroke="#4a443a" stroke-width="2.5"/>
    <circle cx="200" cy="82" r="5" fill="#161410" stroke="#4a443a" stroke-width="2"/>
    <!-- the empty name field -->
    <rect x="160" y="104" width="80" height="34" rx="4" fill="none" stroke="#f1ece2" stroke-width="2" stroke-dasharray="5 5"/>
    <!-- struck-through lines where a name would be -->
    <path d="M162 156 h76" stroke="#4a443a" stroke-width="2.5"/>
    <path d="M162 170 h52" stroke="#4a443a" stroke-width="2.5"/>
    <!-- call meter: 3 of 4 lit -->
    <g>
      <rect x="160" y="186" width="16" height="9" rx="2" fill="#db4322"/>
      <rect x="181" y="186" width="16" height="9" rx="2" fill="#db4322"/>
      <rect x="202" y="186" width="16" height="9" rx="2" fill="#db4322"/>
      <rect x="223" y="186" width="16" height="9" rx="2" fill="none" stroke="#4a443a" stroke-width="1.6"/>
    </g>
  </g>
  <!-- second, fainter tag behind: the other game of the pair -->
  <g opacity="0.55">
    <rect x="258" y="120" width="88" height="112" rx="8" fill="#1b1915" stroke="#3a342a" stroke-width="2"/>
    <rect x="272" y="146" width="60" height="24" rx="3" fill="none" stroke="#4ec6a7" stroke-width="1.8" stroke-dasharray="4 5"/>
    <path d="M272 184 h56" stroke="#3a342a" stroke-width="2"/>
    <path d="M272 196 h38" stroke="#3a342a" stroke-width="2"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#857c6c">
    <text x="30" y="264">호명 3 / 4 — 돌아보지 말 것</text>
    <text x="370" y="264" text-anchor="end" fill="#db4322">endings 11 · 14</text>
  </g>
</svg>
